<!DOCTYPE html>
<html lang="en">
<head>
<title>Smart Medic – Patient Registration</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-deep:   #0a2540;
    --blue-mid:    #1a4d8f;
    --blue-bright: #2d7dd2;
    --blue-light:  #e8f1fb;
    --accent:      #00b4d8;
    --gray-soft:   #f4f7fc;
    --gray-mid:    #8a9bb0;
    --gray-dark:   #3d4f63;
    --red:         #e63946;
    --white:       #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-soft);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--blue-deep);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { color: white; font-size: 20px; font-weight: 600; }
  .logo-text span { color: var(--accent); }
  .header-link {
    margin-left: auto;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    transition: all 0.2s;
  }
  .header-link:hover { background: var(--accent); color: var(--blue-deep); }

  /* Main */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Form card */
  .form-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(10,37,64,0.12);
    overflow: hidden;
    width: 100%;
    max-width: 500px;
  }

  .form-header {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 100%);
    padding: 28px 32px;
    color: white;
  }
  .form-header h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .form-header p { font-size: 13px; opacity: 0.7; }

  form { padding: 28px 32px 32px; }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-dark);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  label .req { color: var(--red); }

  .input-wrap { position: relative; }
  .input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  input, select {
    width: 100%;
    padding: 11px 12px 11px 38px;
    border: 1.5px solid #dde3ed;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--blue-deep);
    background: var(--gray-soft);
    transition: all 0.2s;
    outline: none;
    appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--blue-bright);
    background: white;
    box-shadow: 0 0 0 3px rgba(45,125,210,0.12);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .hint-box {
    background: var(--blue-light);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--blue-mid);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-mid));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(45,125,210,0.4);
  }

  /* Priority badges at bottom */
  .priority-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 16px 32px;
    border-top: 1px solid #eef2f8;
    background: var(--gray-soft);
  }
  .p-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .p-emergency { background: #c0392b; color: white; }
  .p-critical  { background: #ff6b6b; color: white; }
  .p-serious   { background: #ffa94d; color: white; }
  .p-normal    { background: #8ce99a; color: #333; }
</style>
</head>

<body>

<header>
  <div class="logo-icon">🏥</div>
  <div class="logo-text">Smart<span>Medic</span></div>
  <a href="/dashboard" class="header-link">📋 Doctor Dashboard</a>
</header>

<main>
  <div class="form-card">

    <div class="form-header">
      <h2>Patient Registration</h2>
      <p>Fill in patient details — priority is assigned automatically</p>
    </div>

    <form action="/add_patient" method="post">

      <div class="form-row">
        <div class="form-group">
          <label>Patient Name <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" name="name" placeholder="Full name" required>
          </div>
        </div>
        <div class="form-group">
          <label>Age <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="input-icon">🎂</span>
            <input type="number" name="age" placeholder="Years" min="0" max="130" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Symptoms <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="input-icon">🩺</span>
          <input type="text" name="symptoms" placeholder="e.g. chest pain, fever, cough" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Arrival Time <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="input-icon">🕐</span>
            <input type="time" name="time" required>
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-wrap">
            <span class="input-icon">📱</span>
            <input type="text" name="phone" placeholder="+91XXXXXXXXXX">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Assign Doctor <span class="req">*</span></label>
        <div class="input-wrap">
          <span class="input-icon">👨‍⚕️</span>
          <select name="doctor">
            <option>Dr. Sharma</option>
            <option>Dr. Mehta</option>
            <option>Dr. Patel</option>
          </select>
        </div>
      </div>

      <div class="hint-box">
        💡 Priority is assigned automatically based on symptoms and age
      </div>

      <button type="submit" class="btn-submit">➕ Register Patient</button>

    </form>

    <div class="priority-bar">
      <span class="p-badge p-emergency">🆘 Emergency</span>
      <span class="p-badge p-critical">🔴 Critical</span>
      <span class="p-badge p-serious">🟠 Serious</span>
      <span class="p-badge p-normal">🟢 Normal</span>
    </div>

  </div>
</main>

</body>
</html>
